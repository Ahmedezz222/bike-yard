<!-- Forgot Password Section -->
<section class="forgot-password-section">
    <div class="forgot-password-wrapper">
        <h1>Forgot Your Password?</h1>
        <p>No worries! Just enter your email below and we’ll send you instructions on how to reset it.</p>
        <form id="forgot-password-form">
            <!-- Email Input -->
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-primary">Send Reset Instructions</button>
        </form>
        <p>Remembered your password? <a href="login.html">Login</a></p>
    </div>
</section>
