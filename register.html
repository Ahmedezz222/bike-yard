</head>

    <!-- Header -->

        <a href="index.html" class="logo">
            <img src="bike yard logo.png" alt="Bike Yard Logo" style="max-width: 75px;">
        </a>
        <button class="menu-toggle" id="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="nav-menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
                
                
               <li id="login-section">
                    <a href="login.html" id="login-button">Login</a>
                </li><a href="bikeyardcart.html" title="Shopping Cart" class="cart-link">

<!-- Registration Section -->
<section class="register-section">
    <div class="register-wrapper">
        <h1>Create Your Account</h1>
        <p>Join us today to shop exclusive products and enjoy our services.</p>
        <form id="register-form">
            <!-- Name Input -->
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required>
            </div>

            <!-- Email Input -->
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <!-- Password Input -->
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
            </div>

            <!-- Confirm Password Input -->
            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-primary">Register</button>
        </form>

        <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>
</section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Bike Yard Shop. All Rights Reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
