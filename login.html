<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" type="x-icon" href="bike yard logo.png">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Bike Yard Shop</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <img src="bike yard logo.png" alt="Bike Yard Logo" style="max-height: 50px;">
        </a>
        <button class="menu-toggle" id="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="nav-menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="bikeyardcart.html">Cart</a></li>
                <li id="login-section">
                    <a href="login.html" id="login-button">Login</a>
                </li>
            </ul>
        </nav>
    </header>

    <!-- Login Section -->
    <section class="login-section">
        <div class="login-wrapper">
            <h1>Welcome Back!</h1>
            <p>Login to access your account</p>
            <form action="dashboard.html" method="POST">
                <!-- Username/Email -->
                <div class="form-group">
                    <label for="email">Email or Username</label>
                    <input type="text" id="email" name="email" placeholder="Enter your email or username" required>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <!-- Remember Me -->
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember"> Remember Me
                    </label>
                    <a href="forgot-password.html" class="forgot-password">Forgot Password?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-primary">Login</button>
            </form>

            <!-- Registration Link -->
            <p class="register-link">
                Don't have an account? <a href="register.html">Sign Up</a>
            </p>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Bike Yard Shop. All Rights Reserved.</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
