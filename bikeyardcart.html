<html lang="en"><head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" type="x-icon" href="bike yard logo.png">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Bike Yard Shop</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Add EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("-wDZ6NmB97G6Gt_kX");
        })();
    </script>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <img src="bike yard logo.png" alt="Bike Yard Logo">
        </a>
        <button class="menu-toggle" id="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="nav-menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="Menu.pdf">Cafe Menu</a><li>
                    <a href="bikeyardcart.html" class="cart-link">
                        <i class="fas fa-shopping-cart"></i>
                        Cart
                        <span class="cart-count" id="cart-count">0</span>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <!-- Cart Checkout Section -->
    <section class="checkout-section">
        <div class="container">
            <h1 style="
    background: black;
">Cart Checkout</h1>
            <div class="checkout-container">
                <!-- Cart Summary -->
                <div class="cart-summary">
                    <h3>Order Summary</h3>
                    <div id="cart-content">
                        <!-- This div will be shown when cart has items -->
                        <div class="cart-has-items">
                            <table class="shopping-data-table">
                                <thead>
                                    <tr>
                                        <th>Product</th>
                                        <th>Quantity</th>
                                        <th>Action</th>
                                        <th>Price</th>
                                        <th>Total</th>
                                    </tr>
                                </thead>
                                <tbody id="cart-items">
                                    <!-- Cart items will be inserted here by JavaScript -->
                                </tbody>
                            </table>
                            <p>
                                <strong>Subtotal:</strong> 
                                <span id="order-subtotal">0 EGP</span>
                            </p>
                        </div>
                        
                        <!-- This div will be shown when cart is empty -->
                        <div class="cart-empty" style="display: none;">
                            <i class="fas fa-shopping-cart"></i>
                            <p>Your cart is empty</p>
                            <a href="products.html" class="btn-primary">Continue Shopping</a>
                        </div>
                    </div>
                </div>

                <!-- Customer Details Form -->
                <form id="checkout-form" onsubmit="return sendOrderEmail(event)">
                    <h3>Customer Details</h3>
                    <div class="form-group">
                        <label for="name">Full Name:</label>
                        <input type="text" id="name" name="name" placeholder="Enter your full name" required="">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address:</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required="">
                    </div>
                    <div class="form-group">
                        <label for="address">Shipping Address:</label>
                        <input type="text" id="address" name="address" placeholder="Enter your shipping address" required="">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number:</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required="">
                    </div>
                    <div class="form-group">
                        <label for="phone">Other Phone Number:</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter your Other phone number" required="">
                    </div>
                    <div class="form-group">
                        <label for="notes">Order Notes:</label>
                        <textarea id="notes" name="notes" placeholder="Any additional notes for your order"></textarea>
                    </div>

                    <!-- Hidden fields for email template -->
                    <input type="hidden" id="order-details" name="order-details">
                    <input type="hidden" id="order-total" name="order-total">

                    <!-- Payment Options -->
                    <h3>Payment Method</h3>
                    <div class="form-group">
                        <label for="payment">Select Payment Method:</label>
                        <select id="payment" name="payment" required>
                            <option value="">Select a payment method</option>
                            <option value="credit">Credit Card</option>
                            <option value="instapay">InstaPay</option>
                            <option value="cash">Cash on Delivery</option>
                        </select>
                    </div>

                    <!-- Order Confirmation -->
                    <button type="submit" class="btn-primary">Confirm Order</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2024 Bike Yard Shop. All Rights Reserved.</p>
    </footer>

    <script src="scripts.js"></script>
    <script>
        function sendOrderEmail(event) {
            event.preventDefault();
            
            // Validate email format
            const email = document.getElementById('email').value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('Please enter a valid email address');
                return false;
            }

            // Validate phone number
            const phone = document.getElementById('phone').value;
            if (phone.length < 11) {
                alert('Please enter a valid phone number');
                return false;
            }

            // Generate order number with date prefix
            const date = new Date();
            const orderNumber = `ORD-${date.getFullYear()}${(date.getMonth()+1).toString().padStart(2,'0')}${date.getDate().toString().padStart(2,'0')}-${date.getTime().toString().slice(-4)}`;
            
            // Get form data
            const name = document.getElementById('name').value;
            const address = document.getElementById('address').value;
            const payment = document.getElementById('payment').value;
            const notes = document.getElementById('notes').value;
            
            // Get cart items and total
            const cartItems = Array.from(document.getElementById('cart-items').getElementsByTagName('tr'));
            const total = document.getElementById('order-subtotal').textContent;

            // Store order data for confirmation page
            const orderData = {
                orderNumber: orderNumber,
                customerName: name,
                customerEmail: email,
                items: cartItems.map(row => {
                    const cells = row.getElementsByTagName('td');
                    return {
                        name: cells[0].textContent,
                        quantity: cells[1].textContent,
                        price: cells[3].textContent,
                        total: cells[4].textContent
                    };
                }),
                total: total,
                date: new Date().toISOString()
            };
            localStorage.setItem('orderData', JSON.stringify(orderData));

            // Format cart items for email
            const cartItemsList = cartItems
                .map(row => {
                    const cells = row.getElementsByTagName('td');
                    return `
                        Product: ${cells[0].textContent}
                        Quantity: ${cells[1].textContent}
                        Price: ${cells[3].textContent}
                        Total: ${cells[4].textContent}
                    `;
                }).join('\n');

            // Show loading state
            const submitBtn = event.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

            // Prepare template parameters
            const templateParams = {
                name: name,
                email: email,
                address: address,
                phone: phone,
                payment: payment,
                notes: notes,
                items: cartItemsList,
                total: total
            };

            // Send email using EmailJS
            emailjs.send('service_qnsvf0k', 'template_gsefiem', templateParams)
                .then(function(response) {
                    alert('Order placed successfully! You will receive a confirmation email shortly.');
                    localStorage.removeItem('cart');
                    window.location.href = 'order-confirmation.html';
                })
                .catch(function(error) {
                    console.error("Failed to send email:", error);
                    alert('Failed to place order. Please try again.');
                })
                .finally(() => {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Confirm Order';
                });

            return false;
        }
    </script>
</body>
</html>
