<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" type="x-icon" href="bike yard logo.png">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Bike Yard Shop</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header>
        <a href="index.html" class="logo">
            <img src="bike yard logo.png" alt="Bike Yard Logo" style="max-width: 75px;">
        </a>
        <button class="menu-toggle" id="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="nav-menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
                
                
                <li id="login-section">
                    <a href="login.html" id="login-button">Login</a>
                </li>                
                    <a href="bikeyardcart.html" title="Shopping Cart" class="cart-link">
                    <span class="wd-tools-icon wd-icon-alt">
                        <span class="wd-cart-number wd-tools-count">
                            0 <span class="items-text">items</span>
                        </span>
                    </span>
                    <span class="wd-tools-text">
                        <span class="wd-cart-subtotal">
                            <span class="woocommerce-Price-amount amount">
                                <bdi>
                                    <span id="cart-total">0</span>&nbsp;
                                    <span class="woocommerce-Price-currencySymbol">EGP</span>
                                </bdi>
                            </span>
                        </span>
                    </span>
                    
                </a>
            </ul>
        </nav>
    </header>

    <!-- Cart Checkout Section -->
    <section class="checkout-section">
        <div class="container">
            <h1>Cart Checkout</h1>

            <!-- Cart Summary -->
            <div class="cart-summary">
                <h3>Order Summary</h3>
                <table class="shopping-data-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Quantity</th>
                            <th>Price</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="cart-items">
                        <!-- Example Items -->
                        <tr>
                            <td>Mountain Bike</td>
                            <td>2</td>
                            <td>500 EGP</td>
                            <td>1000 EGP</td>
                        </tr>
                        <tr>
                            <td>Helmet</td>
                            <td>1</td>
                            <td>200 EGP</td>
                            <td>200 EGP</td>
                        </tr>
                    </tbody>
                </table>
                <p><strong>Subtotal:</strong> <span id="order-subtotal">1200 EGP</span></p>
            </div>

            <!-- Customer Details Form -->
            <form id="checkout-form">
                <h3>Customer Details</h3>
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="address">Shipping Address:</label>
                    <input type="text" id="address" name="address" placeholder="Enter your shipping address" required>
                </div>

                <!-- Payment Options -->
                <h3>Payment Method</h3>
                <div class="form-group">
                    <label for="payment">Select Payment Method:</label>
                    <select id="payment" name="payment" required>
                        <option value="credit">Credit Card</option>
                        <option value="paypal">PayPal</option>
                        <option value="cash">Cash on Delivery</option>
                    </select>
                </div>

                <!-- Order Confirmation -->
                <button type="submit" class="btn-primary">Confirm Order</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Bike Yard Shop. All Rights Reserved.</p>
    </footer>

</body>
</html>
