<html lang="en"><head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" type="x-icon" href="bike yard logo.png">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Bike Yard Shop</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
<script type="text/javascript">
   (function(){
      emailjs.init({
        publicKey: "YOUR_PUBLIC_KEY", // Replace with your actual public key
      });
   })();
</script>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <img src="bike yard logo.png" alt="Bike Yard Logo">
        </a>
        <button class="menu-toggle" id="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="nav-menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="Menu.pdf">Cafe Menu</a><li>
                    <a href="bikeyardcart.html" class="cart-link">
                        <i class="fas fa-shopping-cart"></i>
                        Cart
                        <span class="cart-count" id="cart-count">0</span>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <!-- Cart Checkout Section -->
    <section class="checkout-section">
        <div class="container">
            <h1 style="
    background: black;
">Cart Checkout</h1>
            <div class="checkout-container">
                <!-- Cart Summary -->
                <div class="cart-summary">
                    <h3>Order Summary</h3>
                    <div id="cart-content">
                        <!-- This div will be shown when cart has items -->
                        <div class="cart-has-items">
                            <table class="shopping-data-table">
                                <thead>
                                    <tr>
                                        <th>Product</th>
                                        <th>Quantity</th>
                                        <th>Action</th>
                                        <th>Price</th>
                                        <th>Total</th>
                                    </tr>
                                </thead>
                                <tbody id="cart-items">
                                    <!-- Cart items will be inserted here by JavaScript -->
                                </tbody>
                            </table>
                            <p>
                                <strong>Subtotal:</strong> 
                                <span id="order-subtotal">0 EGP</span>
                            </p>
                        </div>
                        
                        <!-- This div will be shown when cart is empty -->
                        <div class="cart-empty" style="display: none;">
                            <i class="fas fa-shopping-cart"></i>
                            <p>Your cart is empty</p>
                            <a href="products.html" class="btn-primary">Continue Shopping</a>
                        </div>
                    </div>
                </div>

                <div class="checkout-form">
                    <div class="contact-box">
                        <div class="right">
                            <h2>Checkout</h2>
                            <form id="orderForm">
                                <input type="text" id="name" class="field" placeholder="Full Name" required>
                                <input type="email" id="email" class="field" placeholder="Your Email" required>
                                <input type="tel" id="phone" class="field" placeholder="Phone Number" required>
                                <input type="text" id="address" class="field" placeholder="Delivery Address" required>
                                <select id="payment" class="field" required>
                                    <option value="">Select Payment Method</option>
                                    <option value="cash">Cash on Delivery</option>
                                    <option value="vodafone">Vodafone Cash</option>
                                </select>
                                <textarea id="notes" placeholder="Order Notes" class="field"></textarea>
                                <button type="submit" class="btn">Confirm Order</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2024 Bike Yard Shop. All Rights Reserved.</p>
    </footer>

    <script src="scripts.js"></script>
    <script>
        document.getElementById('orderForm').addEventListener('submit', function(event) {
            event.preventDefault();
            sendOrderEmail();
        });

        function sendOrderEmail() {
            try {
                // Get form data and cart items
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const phone = document.getElementById('phone').value;
                const address = document.getElementById('address').value;
                const payment = document.getElementById('payment').value;
                const notes = document.getElementById('notes').value;

                // Get cart items
                const cartItems = Array.from(document.getElementById('cart-items').getElementsByTagName('tr'));
                const cartItemsList = cartItems
                    .map(row => {
                        const cells = row.getElementsByTagName('td');
                        return `${cells[0].textContent} x${cells[1].textContent} - ${cells[4].textContent}`;
                    }).join('\n');
                const total = document.getElementById('order-subtotal').textContent;

                // Show loading state
                const submitBtn = event.target.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Processing...';

                // Send email using EmailJS
                emailjs.send(
                    "service_qm8iqyh", // Your EmailJS service ID
                    "template_k4373sp", // Your EmailJS template ID
                    {
                        to_name: "Bike Yard Shop",
                        from_name: name,
                        customer_email: email,
                        phone_number: phone,
                        delivery_address: address,
                        payment_method: payment,
                        order_notes: notes || 'No notes provided',
                        order_items: cartItemsList,
                        order_total: total,
                        message: `Order Details:\n\nItems:\n${cartItemsList}\n\nTotal: ${total}\nDelivery Address: ${address}\nPayment Method: ${payment}\nNotes: ${notes || 'None'}`
                    }
                )
                .then(function() {
                    alert("Order placed successfully! We'll contact you soon.");
                    
                    // Clear cart and form
                    localStorage.removeItem('cart');
                    document.getElementById('cart-items').innerHTML = '';
                    document.getElementById('cart-count').textContent = '0';
                    document.getElementById('order-subtotal').textContent = '0 EGP';
                    document.getElementById('orderForm').reset();
                    
                    // Update UI
                    document.querySelector('.cart-has-items').style.display = 'none';
                    document.querySelector('.cart-empty').style.display = 'block';
                    
                    // Reset button
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Confirm Order';
                })
                .catch(function(error) {
                    console.error("FAILED", error);
                    alert("Failed to place order. Please try again or contact us directly.");
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Confirm Order';
                });

            } catch (error) {
                console.error("Error processing order:", error);
                alert("An error occurred while processing your order. Please try again.");
            }

            return false;
        }
    </script>
</body>
</html>
