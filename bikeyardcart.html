<html lang="en"><head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" type="x-icon" href="bike yard logo.png">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Bike Yard Shop</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("-wDZ6NmB97G6Gt_kX"); // Replace with your actual EmailJS public key
       })();
    </script>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <img src="bike yard logo.png" alt="Bike Yard Logo">
        </a>
        <button class="menu-toggle" id="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="nav-menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="Menu.pdf">Cafe Menu</a><li>
                    <a href="bikeyardcart.html" class="cart-link">
                        <i class="fas fa-shopping-cart"></i>
                        Cart
                        <span class="cart-count" id="cart-count">0</span>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <!-- Cart Checkout Section -->
    <section class="checkout-section">
        <div class="container">
            <h1 style="
    background: black;
">Cart Checkout</h1>
            <div class="checkout-container">
                <!-- Cart Summary -->
                <div class="cart-summary">
                    <h3>Order Summary</h3>
                    <div id="cart-content">
                        <!-- This div will be shown when cart has items -->
                        <div class="cart-has-items">
                            <table class="shopping-data-table">
                                <thead>
                                    <tr>
                                        <th>Product</th>
                                        <th>Quantity</th>
                                        <th>Action</th>
                                        <th>Price</th>
                                        <th>Total</th>
                                    </tr>
                                </thead>
                                <tbody id="cart-items">
                                    <!-- Cart items will be inserted here by JavaScript -->
                                </tbody>
                            </table>
                            <p>
                                <strong>Subtotal:</strong> 
                                <span id="order-subtotal">0 EGP</span>
                            </p>
                        </div>
                        
                        <!-- This div will be shown when cart is empty -->
                        <div class="cart-empty" style="display: none;">
                            <i class="fas fa-shopping-cart"></i>
                            <p>Your cart is empty</p>
                            <a href="products.html" class="btn-primary">Continue Shopping</a>
                        </div>
                    </div>
                </div>

                <div class="checkout-form">
                    <div class="contact-box">
                        <div class="right">
                            <h2>Checkout</h2>
                            <form id="orderForm">
                                <input type="text" id="name" class="field" placeholder="Full Name" required>
                                <input type="email" id="email" class="field" placeholder="Your Email" required>
                                <input type="tel" id="phone" class="field" placeholder="Phone Number" required>
                                <input type="text" id="address" class="field" placeholder="Delivery Address" required>
                                <select id="payment" class="field" required>
                                    <option value="">Select Payment Method</option>
                                    <option value="cash">Cash on Delivery</option>
                                    <option value="vodafone">Vodafone Cash</option>
                                </select>
                                <textarea id="notes" placeholder="Order Notes" class="field"></textarea>
                                <button type="submit" class="btn">Confirm Order</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2024 Bike Yard Shop. All Rights Reserved.</p>
    </footer>

    <script src="scripts.js"></script>
    <script>
        document.getElementById('orderForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            // Show loading state
            const submitBtn = event.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            // Get form data
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                payment: document.getElementById('payment').value,
                notes: document.getElementById('notes').value,
                items: Array.from(document.getElementById('cart-items').getElementsByTagName('tr'))
                    .map(row => {
                        const cells = row.getElementsByTagName('td');
                        return `${cells[0].textContent.trim()} - Quantity: ${cells[1].textContent.trim()} - Total: ${cells[4].textContent.trim()}`;
                    }).join('\n'),
                total: document.getElementById('order-subtotal').textContent
            };

            // Send email using EmailJS
            emailjs.send(
                "service_qnsvf0k", // Replace with your EmailJS service ID
                "template_gsefiem", // Replace with your EmailJS template ID
                {
                    to_name: "Bike Yard Shop",
                    from_name: formData.name,
                    customer_email: formData.email,
                    phone_number: formData.phone,
                    delivery_address: formData.address,
                    payment_method: formData.payment,
                    order_notes: formData.notes || 'No notes provided',
                    order_items: formData.items,
                    order_total: formData.total,
                    message: `New Order:\n\nCustomer Details:\nName: ${formData.name}\nEmail: ${formData.email}\nPhone: ${formData.phone}\nAddress: ${formData.address}\n\nOrder Details:\n${formData.items}\n\nTotal: ${formData.total}\nPayment Method: ${formData.payment}\nNotes: ${formData.notes || 'None'}`
                }
            )
            .then(function() {
                // Success handling
                alert("Order placed successfully! We'll contact you soon.");
                
                // Clear cart and form
                localStorage.removeItem('cart');
                document.getElementById('cart-items').innerHTML = '';
                document.getElementById('cart-count').textContent = '0';
                document.getElementById('order-subtotal').textContent = '0 EGP';
                document.getElementById('orderForm').reset();
                
                // Update UI
                document.querySelector('.cart-has-items').style.display = 'none';
                document.querySelector('.cart-empty').style.display = 'block';
                
                // Reset button
                submitBtn.disabled = false;
                submitBtn.textContent = 'Confirm Order';
            })
            .catch(function(error) {
                // Error handling
                console.error("Error sending order:", error);
                alert("Failed to place order. Please try again or contact us directly.");
                submitBtn.disabled = false;
                submitBtn.textContent = 'Confirm Order';
            });
        });
    </script>
</body>
</html>
